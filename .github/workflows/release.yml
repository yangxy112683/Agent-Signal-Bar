name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode.app/Contents/Developer ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run Swift tests
        run: swift test

      - name: Package release
        run: ./script/package_release.sh

      - name: Verify checksums
        run: shasum -a 256 -c dist/AgentSignalLight-SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Agent Signal Bar ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/AgentSignalLight-local.zip
            dist/AgentSignalLight-local.dmg
            dist/AgentSignalLight-release-manifest.json
            dist/AgentSignalLight-SHA256SUMS.txt

