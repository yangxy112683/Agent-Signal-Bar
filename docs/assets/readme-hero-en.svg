<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="740" viewBox="0 0 1600 740" role="img" aria-labelledby="title desc">
  <title id="title">Agent Signal Bar website hero preview</title>
  <desc id="desc">A promotional preview for Agent Signal Bar with signal lights, feature cards, and a website pill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.34" stop-color="#0b1018"/>
      <stop offset="0.7" stop-color="#0d3f42"/>
      <stop offset="1" stop-color="#101026"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.08" cy="0.16" r="0.64">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.56"/>
      <stop offset="0.5" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="0.92" cy="0.18" r="0.64">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="0.46" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="teal" cx="0.56" cy="0.86" r="0.58">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.46"/>
      <stop offset="0.52" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .font { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; }
      .muted { fill: #cbd5e1; opacity: 0.82; }
      .label { fill: #f8fafc; font-weight: 760; }
      .small { fill: #cbd5e1; font-weight: 650; opacity: 0.9; }
      .card { fill: #101826; fill-opacity: 0.72; stroke: #ffffff; stroke-opacity: 0.12; }
      .avatarText { fill: white; font-size: 25px; font-weight: 860; text-anchor: middle; dominant-baseline: middle; alignment-baseline: middle; }
    </style>
  </defs>

  <rect width="1600" height="740" rx="0" fill="url(#bg)"/>
  <rect width="1600" height="740" fill="url(#warm)"/>
  <rect width="1600" height="740" fill="url(#violet)"/>
  <rect width="1600" height="740" fill="url(#teal)"/>
  <rect width="1600" height="740" fill="url(#grid)" opacity="0.58"/>

  <g class="font" filter="url(#shadow)">
    <g transform="translate(76 82)">
      <image x="-16" y="-16" width="90" height="90" preserveAspectRatio="xMidYMid meet" href="data:image/png;base64,"/>
      <text x="76" y="38" fill="#f8fafc" font-size="28" font-weight="820">Agent Signal Bar</text>
    </g>

    <g transform="translate(1234 88)">
      <rect x="0" y="0" width="270" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="135" y="29" fill="#d7f8f3" font-size="21" font-weight="760" text-anchor="middle">agentsignalbar.app</text>
    </g>

    <text x="78" y="230" fill="#ffffff" font-size="72" font-weight="900" letter-spacing="0">
      Know what every AI agent
    </text>
    <text x="78" y="318" fill="#ffffff" font-size="72" font-weight="900" letter-spacing="0">
      is doing, <tspan fill="#fb7185">from your</tspan>
    </text>
    <text x="78" y="406" fill="#38bdf8" font-size="72" font-weight="900" letter-spacing="0">
      menu bar.
    </text>

    <text x="80" y="462" class="muted" font-size="25" font-weight="650">
      Codex and Claude activity, visible from your menu bar through red, yellow, and green status lights
    </text>

    <g transform="translate(80 520)">
      <g transform="translate(0 0)">
        <rect class="card" width="250" height="78" rx="12"/>
        <rect x="18" y="18" width="42" height="42" rx="9" fill="#2563eb"/>
        <text class="avatarText" x="39" y="40">C</text>
        <text class="label" x="76" y="46" font-size="24">Codex</text>
      </g>
      <g transform="translate(272 0)">
        <rect class="card" width="230" height="78" rx="12"/>
        <rect x="18" y="18" width="42" height="42" rx="9" fill="#a855f7"/>
        <text class="avatarText" x="39" y="40">C</text>
        <text class="label" x="76" y="46" font-size="24">Claude</text>
      </g>
    </g>

  </g>
</svg>
